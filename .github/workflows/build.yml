name: Build & Release Glasspectum

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════
  # macOS build (arm64 + x86_64 universal)
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build (arm64)
        run: |
          mkdir build-arm64 && cd build-arm64
          cmake .. -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu)

      - name: Build (x86_64)
        run: |
          mkdir build-x86 && cd build-x86
          cmake .. -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu)

      - name: Create universal binary
        run: |
          mkdir -p Glasspectum.ofx.bundle/Contents/MacOS
          mkdir -p Glasspectum.ofx.bundle/Contents/Resources
          lipo -create \
            build-arm64/Glasspectum.ofx.bundle/Contents/MacOS/Glasspectum.ofx \
            build-x86/Glasspectum.ofx.bundle/Contents/MacOS/Glasspectum.ofx \
            -output Glasspectum.ofx.bundle/Contents/MacOS/Glasspectum.ofx
          cp build-arm64/Glasspectum.ofx.bundle/Contents/Info.plist Glasspectum.ofx.bundle/Contents/
          cp build-arm64/Glasspectum.ofx.bundle/Contents/Resources/* Glasspectum.ofx.bundle/Contents/Resources/

      - name: Run tests
        run: |
          cd build-arm64
          ./tests/test_lens_db
          ./tests/test_pipeline

      - name: Package
        run: |
          cp scripts/install_macos.sh install.sh
          chmod +x install.sh
          zip -r Glasspectum-${{ github.ref_name || 'v1.0.0' }}-macOS.zip \
            Glasspectum.ofx.bundle install.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: Glasspectum-*.zip

  # ═══════════════════════════════════════════════════════════════
  # Linux build (x86_64)
  # ═══════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ 

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ./tests/test_lens_db
          ./tests/test_pipeline

      - name: Package
        run: |
          cp scripts/install_linux.sh install.sh
          chmod +x install.sh
          cp -r build/Glasspectum.ofx.bundle .
          zip -r Glasspectum-${{ github.ref_name || 'v1.0.0' }}-Linux.zip \
            Glasspectum.ofx.bundle install.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Glasspectum-*.zip

  # ═══════════════════════════════════════════════════════════════
  # Windows build (x64)
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -G "Visual Studio 17 2022" -A x64
          cmake --build . --config Release

      - name: Run tests
        run: |
          cd build
          .\tests\Release\test_lens_db.exe
          .\tests\Release\test_pipeline.exe

      - name: Package
        shell: pwsh
        run: |
          Copy-Item scripts\install_windows.bat install.bat
          Copy-Item -Recurse build\Glasspectum.ofx.bundle .
          Compress-Archive -Path Glasspectum.ofx.bundle, install.bat `
            -DestinationPath "Glasspectum-$($env:GITHUB_REF_NAME ?? 'v1.0.0')-Windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: Glasspectum-*.zip

  # ═══════════════════════════════════════════════════════════════
  # Create GitHub Release with all 3 platform zips
  # ═══════════════════════════════════════════════════════════════
  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Glasspectum ${{ github.ref_name }}"
          body: |
            ## Glasspectum ${{ github.ref_name }}

            Lens emulation OFX plugin for DaVinci Resolve 18.6+

            ### Installation

            1. Download the zip for your platform below
            2. Unzip it
            3. Run the install script (`install.sh` on macOS/Linux, `install.bat` on Windows)
            4. Restart DaVinci Resolve
            5. Find **Glasspectum** in the OpenFX effects panel

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon + Intel) | `Glasspectum-${{ github.ref_name }}-macOS.zip` |
            | Linux (x86_64) | `Glasspectum-${{ github.ref_name }}-Linux.zip` |
            | Windows (x64) | `Glasspectum-${{ github.ref_name }}-Windows.zip` |
          files: Glasspectum-*.zip
          draft: false
          prerelease: false
